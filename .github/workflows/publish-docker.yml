## Adapted from https://docs.github.com/en/actions/tutorials/publish-packages/publish-docker-images
name: Publish Docker images

on:
  workflow_call:
  workflow_dispatch:

jobs:
  push-to-registry:
    name: Push Docker images to Docker Hub
    runs-on: ubuntu-24.04
    environment: Docker
    permissions:
      packages: write
      contents: read
      attestations: write
      id-token: write
    steps:
      - name: Checkout Arelle
        uses: actions/checkout@v6.0.2
        with: 
          fetch-depth: 0

      - name: Log in to Docker Hub
        uses: docker/login-action@v4.0.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v6.0.0
        with:
          images: |
            ${{ secrets.DOCKER_USERNAME }}/arelle

      - name: Build and push Docker images
        id: push
        uses: docker/build-push-action@v7.0.0
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.tags }}
          labels: |
            ${{ steps.meta.outputs.labels }}

      - name: Generate artifact attestation
        uses: actions/attest@v4.1.0
        with:
          subject-name: index.docker.io/${{ secrets.DOCKER_USERNAME }}/arelle
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

