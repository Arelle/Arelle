## Adapted from https://docs.github.com/en/actions/tutorials/publish-packages/publish-docker-images
name: Publish Docker images

on:
  workflow_call:
    inputs:
      python_version:
        default: '3.14.2'
        description: 'Python version to use'
        required: true
        type: string
      arelle_ref:
        default: 'master'
        description: 'Arelle/Arelle branch, tag or SHA to checkout (blank for default)'
        required: false
        type: string
      edgar_ref:
        default: ''
        description: 'Arelle/EDGAR branch, tag or SHA to checkout (blank for default)'
        required: false
        type: string
      xule_ref:
        default: ''
        description: 'xbrlus/xule branch, tag or SHA to checkout (blank for default)'
        required: false
        type: string

  workflow_dispatch:
    inputs:
      python_version:
        default: '3.14.2'
        description: 'Python version to use'
        required: true
        type: string
      arelle_ref:
        default: 'master'
        description: 'Arelle/Arelle branch, tag or SHA to checkout (blank for default)'
        required: false
        type: string
      edgar_ref:
        default: ''
        description: 'Arelle/EDGAR branch, tag or SHA to checkout (blank for default)'
        required: false
        type: string
      xule_ref:
        default: ''
        description: 'xbrlus/xule branch, tag or SHA to checkout (blank for default)'
        required: false
        type: string

jobs:
  push-to-registry:
    name: Push Docker images to Docker Hub
    runs-on: ubuntu-24.04
    environment: release
    permissions:
      packages: write
      contents: read
      attestations: write
      id-token: write
    steps:
      - name: Checkout Arelle
        uses: actions/checkout@v6.0.2
        with: 
          ref: ${{ inputs.arelle_ref }}
          fetch-depth: 1

      - name: Log in to Docker Hub
        uses: docker/login-action@v4.0.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v6.0.0
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/arelle
          tags: |
            type=semver,pattern={{major}}.{{minor}}.{{patch}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: Extract metadata (tags, labels) for slim Docker
        id: meta-slim
        uses: docker/metadata-action@v6.0.0
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/arelle
          flavor: |
            latest=false
          tags: |
            slim
            type=semver,pattern={{major}}.{{minor}}.{{patch}}-slim
            type=semver,pattern={{major}}.{{minor}}-slim
            type=semver,pattern={{major}}-slim

      - name: Build and push slim Docker images
        id: push-slim
        uses: docker/build-push-action@v7.0.0
        with:
          context: .
          file: docker/Dockerfile
          build-args: |
            PYTHON_VERSION=${{ inputs.python_version }}
          push: true
          tags: ${{ steps.meta-slim.outputs.tags }}
          labels: ${{ steps.meta-slim.outputs.labels }}

      - name: Build and push Docker images
        id: push
        uses: docker/build-push-action@v7.0.0
        with:
          context: .
          file: docker/Dockerfile
          build-args: |
            PYTHON_VERSION=${{ inputs.python_version }}
            INCLUDE_EDGAR=true
            EDGAR_REF=${{ inputs.edgar_ref }}
            XULE_REF=${{ inputs.xule_ref }}
            EXTRA_PIP=-r requirements-plugins.txt
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Generate artifact attestation
        uses: actions/attest@v4.1.0
        with:
          subject-name: index.docker.io/${{ secrets.DOCKER_USERNAME }}/arelle
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

      - name: Generate artifact attestation slim
        uses: actions/attest@v4.1.0
        with:
          subject-name: index.docker.io/${{ secrets.DOCKER_USERNAME }}/arelle
          subject-digest: ${{ steps.push-slim.outputs.digest }}
          push-to-registry: true
