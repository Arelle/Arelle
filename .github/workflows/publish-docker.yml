## Adapted from https://docs.github.com/en/actions/tutorials/publish-packages/publish-docker-images
## & https://docs.docker.com/build/ci/github-actions/push-multi-registries/

name: Publish Docker images

on:
  workflow_call:
    inputs:
      python_version:
        default: '3.14.4'
        description: 'Python version to use'
        required: false
        type: string
      edgar_ref:
        default: ''
        description: 'Arelle/EDGAR branch, tag or SHA to checkout (blank for default)'
        required: false
        type: string
      xule_ref:
        default: ''
        description: 'xbrlus/xule branch, tag or SHA to checkout (blank for default)'
        required: false
        type: string

  workflow_dispatch:
    inputs:
      python_version:
        default: '3.14.4'
        description: 'Python version to use'
        required: true
        type: string
      edgar_ref:
        default: ''
        description: 'Arelle/EDGAR branch, tag or SHA to checkout (blank for default)'
        required: false
        type: string
      xule_ref:
        default: ''
        description: 'xbrlus/xule branch, tag or SHA to checkout (blank for default)'
        required: false
        type: string

permissions: {}

jobs:
  push-to-registry:
    name: Push Docker images
    runs-on: ubuntu-24.04
    environment: release
    permissions:
      packages: write
      contents: read
      attestations: write
      id-token: write
    env:
      DOCKERHUB_IMAGE: ${{ vars.DOCKER_NAMESPACE || vars.DOCKER_USERNAME }}/${{ github.event.repository.name }}
    steps:
      - name: Checkout Arelle
        uses: actions/checkout@v6.0.2
        with: 
          fetch-depth: 1

      - name: Log in to Docker Hub
        uses: docker/login-action@v4.0.0
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Log in to GHCR
        uses: docker/login-action@v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Extract metadata (tags, labels) for slim Docker
        id: meta-slim
        uses: docker/metadata-action@v6.0.0
        with:
          images: |
            ${{ env.DOCKERHUB_IMAGE }}
            ghcr.io/${{ github.repository }}
          flavor: |
            latest=false
          tags: |
            slim
            type=semver,pattern={{major}}.{{minor}}.{{patch}}-slim
            type=semver,pattern={{major}}.{{minor}}-slim
            type=semver,pattern={{major}}-slim

      - name: Build and push slim Docker images
        id: push-slim
        uses: docker/build-push-action@v7.0.0
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          build-args: |
            PYTHON_VERSION=${{ inputs.python_version }}
          push: true
          tags: ${{ steps.meta-slim.outputs.tags }}
          labels: ${{ steps.meta-slim.outputs.labels }}
          annotations: ${{ steps.meta-slim.outputs.annotations }}
          provenance: true
          sbom: true

      - name: Checkout EDGAR
        uses: actions/checkout@v6.0.2
        with:
          repository: Arelle/EDGAR
          path: arelle/plugin/EDGAR
          ref: ${{ inputs.edgar_ref }}
          fetch-depth: 1

      - name: Cleanup EDGAR
        run: rm -rf arelle/plugin/EDGAR/.git

      - name: Checkout XULE
        uses: actions/checkout@v6.0.2
        with:
          repository: xbrlus/xule
          path: xule
          ref: ${{ inputs.xule_ref }}
          fetch-depth: 1

      - name: Move XULE plugins
        run: |
          mv xule/plugin/validate/* arelle/plugin/validate/
          rm -rf xule/plugin/validate
          mv xule/plugin/* arelle/plugin/

      - name: Cleanup XULE
        run: rm -rf xule

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v6.0.0
        with:
          images: |
            ${{ env.DOCKERHUB_IMAGE }}
            ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{major}}.{{minor}}.{{patch}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: Build and push Docker images
        id: push
        uses: docker/build-push-action@v7.0.0
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          build-args: |
            PYTHON_VERSION=${{ inputs.python_version }}
            INCLUDE_EDGAR=true
            EXTRA_PIP=-r requirements-plugins.txt
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          provenance: true
          sbom: true

      - name: Generate artifact attestation
        uses: actions/attest@v4.1.0
        with:
          subject-name: index.docker.io/${{ env.DOCKERHUB_IMAGE }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

      - name: Generate artifact attestation slim
        uses: actions/attest@v4.1.0
        with:
          subject-name: index.docker.io/${{ env.DOCKERHUB_IMAGE }}
          subject-digest: ${{ steps.push-slim.outputs.digest }}
          push-to-registry: true
