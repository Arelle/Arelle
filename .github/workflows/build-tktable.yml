name: Build TkTable
on:
  workflow_dispatch:
    inputs:
      tktable_tag:
        default: 'tktable-2-12-1'
        description: 'TkTable git tag to build (e.g. tktable-2-12-1)'
        required: true
        type: string
      tcltk_8_tag:
        default: 'core-8-6-18'
        description: 'Tcl/Tk 8 git tag (e.g. core-8-6-18)'
        required: true
        type: string
      tcltk_9_tag:
        default: 'core-9-0-3'
        description: 'Tcl/Tk 9 git tag (e.g. core-9-0-3)'
        required: true
        type: string

permissions: {}

jobs:
  build-macos-arm64:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          repository: bohagan1/TkTable
          ref: ${{ inputs.tktable_tag }}
          path: TkTable
      - name: Install Tcl/Tk
        run: brew install tcl-tk@8 tcl-tk@9
      - name: Build for Tcl 8
        run: |
          cd TkTable
          TCL_DIR=$(brew --prefix tcl-tk@8)/lib
          ./configure --with-tcl=$TCL_DIR --with-tk=$TCL_DIR
          make
      - name: Collect Tcl 8 artifacts
        run: |
          mkdir -p output
          cp TkTable/*.dylib output/
          cp TkTable/pkgIndex.tcl output/
          cp TkTable/library/tkTable.tcl output/
      - name: Build for Tcl 9
        run: |
          cd TkTable
          make clean
          TCL_DIR=$(brew --prefix tcl-tk@9)/lib
          ./configure --with-tcl=$TCL_DIR --with-tk=$TCL_DIR
          make
      - name: Collect Tcl 9 artifacts
        run: |
          cp TkTable/*.dylib output/
      - uses: actions/upload-artifact@v7.0.1
        with:
          name: tktable-macos-arm64
          path: output/

  build-macos-x86_64:
    runs-on: macos-26-intel
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          repository: bohagan1/TkTable
          ref: ${{ inputs.tktable_tag }}
          path: TkTable
      - name: Install Tcl/Tk
        run: brew install tcl-tk@8 tcl-tk@9
      - name: Build for Tcl 8
        run: |
          cd TkTable
          TCL_DIR=$(brew --prefix tcl-tk@8)/lib
          ./configure --with-tcl=$TCL_DIR --with-tk=$TCL_DIR
          make
      - name: Collect Tcl 8 artifacts
        run: |
          mkdir -p output
          cp TkTable/*.dylib output/
          cp TkTable/pkgIndex.tcl output/
          cp TkTable/library/tkTable.tcl output/
      - name: Build for Tcl 9
        run: |
          cd TkTable
          make clean
          TCL_DIR=$(brew --prefix tcl-tk@9)/lib
          ./configure --with-tcl=$TCL_DIR --with-tk=$TCL_DIR
          make
      - name: Collect Tcl 9 artifacts
        run: |
          cp TkTable/*.dylib output/
      - uses: actions/upload-artifact@v7.0.1
        with:
          name: tktable-macos-x86_64
          path: output/

  build-linux-x86_64:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          repository: bohagan1/TkTable
          ref: ${{ inputs.tktable_tag }}
          path: TkTable
      - name: Checkout Tcl 8
        uses: actions/checkout@v7.0.0
        with:
          repository: tcltk/tcl
          ref: ${{ inputs.tcltk_8_tag }}
          path: tcl8-src
      - name: Checkout Tcl 9
        uses: actions/checkout@v7.0.0
        with:
          repository: tcltk/tcl
          ref: ${{ inputs.tcltk_9_tag }}
          path: tcl9-src
      - name: Checkout Tk 8
        uses: actions/checkout@v7.0.0
        with:
          repository: tcltk/tk
          ref: ${{ inputs.tcltk_8_tag }}
          path: tk8-src
      - name: Checkout Tk 9
        uses: actions/checkout@v7.0.0
        with:
          repository: tcltk/tk
          ref: ${{ inputs.tcltk_9_tag }}
          path: tk9-src
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential zip zlib1g-dev libx11-dev libxext-dev libxft-dev libxss-dev
      - name: Build Tcl 8
        run: |
          cd tcl8-src/unix
          ./configure --prefix=$PWD/../../tcl8-install
          make
          make install
      - name: Build Tcl 9
        run: |
          cd tcl9-src/unix
          ./configure --prefix=$PWD/../../tcl9-install
          make
          make install
      - name: Build TkTable for Tcl 8
        run: |
          cd tk8-src/unix
          ./configure --prefix=$PWD/../../tcl8-install --with-tcl=$PWD/../../tcl8-install/lib
          make
          make install
      - name: Build Tk 9
        run: |
          cd tk9-src/unix
          ./configure --prefix=$PWD/../../tcl9-install --with-tcl=$PWD/../../tcl9-install/lib
          make
          make install
      - name: Build for Tcl 8
        run: |
          cd TkTable
          ./configure --with-tcl=$PWD/../tcl8-install/lib --with-tk=$PWD/../tcl8-install/lib
          make
      - name: Collect Tcl 8 artifacts
        run: |
          mkdir -p output
          cp TkTable/*.so output/
          cp TkTable/pkgIndex.tcl output/
          cp TkTable/library/tkTable.tcl output/
      - name: Build TkTable for Tcl 9
        run: |
          cd TkTable
          make clean
          ./configure --with-tcl=$PWD/../tcl9-install/lib --with-tk=$PWD/../tcl9-install/lib
          make
      - name: Collect Tcl 9 artifacts
        run: |
          cp TkTable/*.so output/
      - uses: actions/upload-artifact@v7.0.1
        with:
          name: tktable-linux-x86_64
          path: output/

  build-windows-x86_64:
    runs-on: windows-2025
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          repository: bohagan1/TkTable
          ref: ${{ inputs.tktable_tag }}
          path: TkTable
      - name: Checkout Tcl 8
        uses: actions/checkout@v7.0.0
        with:
          repository: tcltk/tcl
          ref: ${{ inputs.tcltk_8_tag }}
          path: tcl8-src
      - name: Checkout Tcl 9
        uses: actions/checkout@v7.0.0
        with:
          repository: tcltk/tcl
          ref: ${{ inputs.tcltk_9_tag }}
          path: tcl9-src
      - name: Checkout Tk 8
        uses: actions/checkout@v7.0.0
        with:
          repository: tcltk/tk
          ref: ${{ inputs.tcltk_8_tag }}
          path: tk8-src
      - name: Checkout Tk 9
        uses: actions/checkout@v7.0.0
        with:
          repository: tcltk/tk
          ref: ${{ inputs.tcltk_9_tag }}
          path: tk9-src
      - uses: ilammy/msvc-dev-cmd@v1.13.0
        with:
          arch: x64
      - name: Build Tcl 8
        shell: cmd
        run: |
          cd tcl8-src\win
          nmake /f makefile.vc release INSTALLDIR=%CD%\..\..\tcl8-install
          nmake /f makefile.vc install INSTALLDIR=%CD%\..\..\tcl8-install
      - name: Build Tk 8
        shell: cmd
        run: |
          cd tk8-src\win
          nmake /f makefile.vc release INSTALLDIR=%CD%\..\..\tcl8-install TCLDIR=%CD%\..\..\tcl8-src
          nmake /f makefile.vc install INSTALLDIR=%CD%\..\..\tcl8-install TCLDIR=%CD%\..\..\tcl8-src
      - name: Build Tcl 9
        shell: cmd
        run: |
          cd tcl9-src\win
          nmake /f makefile.vc release INSTALLDIR=%CD%\..\..\tcl9-install
          nmake /f makefile.vc install INSTALLDIR=%CD%\..\..\tcl9-install
      - name: Build Tk 9
        shell: cmd
        run: |
          cd tk9-src\win
          nmake /f makefile.vc release INSTALLDIR=%CD%\..\..\tcl9-install TCLDIR=%CD%\..\..\tcl9-src
          nmake /f makefile.vc install INSTALLDIR=%CD%\..\..\tcl9-install TCLDIR=%CD%\..\..\tcl9-src
      - name: Build TkTable for Tcl 8
        shell: cmd
        run: |
          cd TkTable\win
          nmake /f makefile.vc INSTALLDIR=%CD%\..\..\tcl8-install TCLDIR=%CD%\..\..\tcl8-src TKDIR=%CD%\..\..\tk8-src
          nmake /f makefile.vc install INSTALLDIR=%CD%\..\..\tcl8-install TCLDIR=%CD%\..\..\tcl8-src TKDIR=%CD%\..\..\tk8-src
      - name: Collect Tcl 8 artifacts
        run: |
          mkdir output -ErrorAction SilentlyContinue
          $tktableDir = Get-ChildItem -Path "tcl8-install\lib" -Directory -Filter "Tktable*" | Select-Object -First 1
          Copy-Item "$($tktableDir.FullName)\*.dll" output\
          Copy-Item "$($tktableDir.FullName)\pkgIndex.tcl" output\
          Copy-Item "$($tktableDir.FullName)\tkTable.tcl" output\
      - name: Build TkTable for Tcl 9
        shell: cmd
        run: |
          cd TkTable\win
          nmake /f makefile.vc clean
          nmake /f makefile.vc INSTALLDIR=%CD%\..\..\tcl9-install TCLDIR=%CD%\..\..\tcl9-src TKDIR=%CD%\..\..\tk9-src
          nmake /f makefile.vc install INSTALLDIR=%CD%\..\..\tcl9-install TCLDIR=%CD%\..\..\tcl9-src TKDIR=%CD%\..\..\tk9-src
      - name: Collect Tcl 9 artifacts
        run: |
          $tktableDir = Get-ChildItem -Path "tcl9-install\lib" -Directory -Filter "Tktable*" | Select-Object -First 1
          Copy-Item "$($tktableDir.FullName)\*.dll" output\
      - uses: actions/upload-artifact@v7.0.1
        with:
          name: tktable-win-x86_64
          path: output/
