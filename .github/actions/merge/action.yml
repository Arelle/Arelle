name: 'Merge'
description: 'Fetches and merges a specific SHA from a fork or branch'
inputs:
  commit_sha:
    description: 'The specific commit SHA to merge'
    required: true
  fetch_depth:
    description: 'The depth of commit history to fetch'
    required: true
    default: 100
  repository_full_name:
    description: 'The full name of the repository to fetch from (e.g., owner/repo)'
    required: true

runs:
  using: "composite"
  steps:
    - name: Fetch and Merge Remote SHA
      shell: bash
      env:
        DEPTH: ${{ inputs.fetch_depth }}
        REPO: ${{ inputs.repository_full_name }}
        SHA: ${{ inputs.commit_sha }}
      run: |
        # Background GC occassionally causes shallow file conflicts during fetch, so we disable it.
        git config gc.auto 0

        git config user.name "github-actions"
        git config user.email "github-actions@github.com"
        
        echo "Fetching $SHA from $REPO with depth $DEPTH..."
        git fetch --deepen="$DEPTH" "https://github.com/$REPO.git" "$SHA"

        echo "Deepening base branch history to depth $DEPTH..."
        max_attempts=3
        for ((i=1; i<=max_attempts; i++)); do
          git fetch --deepen="$DEPTH" origin && break
          if ((i == max_attempts)); then
            echo "::error::Failed to deepen base branch history after $max_attempts attempts."
            exit 1
          fi
          echo "Attempt $i failed, retrying..."
          sleep 1
        done

        git merge "$SHA" --no-edit || {
          echo "::error::Merge failed. Ancestor not found within $DEPTH commits or a conflict exists."
          git merge --abort
          exit 1
        }
