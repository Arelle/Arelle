name: 'Merge'
description: 'Fetches and merges a specific SHA from a fork or branch'
inputs:
  commit_sha:
    description: 'The specific commit SHA to merge'
    required: true
  fetch_depth:
    description: 'The depth of commit history to fetch'
    required: true
    default: 100
  repository_full_name:
    description: 'The full name of the repository to fetch from (e.g., owner/repo)'
    required: true

runs:
  using: "composite"
  steps:
    - name: Fetch and Merge Remote SHA
      shell: bash
      env:
        DEPTH: ${{ inputs.fetch_depth }}
        REPO: ${{ inputs.repository_full_name }}
        SHA: ${{ inputs.commit_sha }}
      run: |
        git config user.name "github-actions"
        git config user.email "github-actions@github.com"
        
        echo "Fetching $SHA from $REPO with depth $DEPTH..."
        git fetch --quiet --depth="$DEPTH" "https://github.com/$REPO.git" "$SHA"

        echo "Deepening base branch history to depth $DEPTH..."
        git fetch --quiet --depth="$DEPTH" origin

        git merge FETCH_HEAD --no-edit || {
          echo "::error::Merge failed. Ancestor not found within $DEPTH commits or a conflict exists."
          git merge --abort
          exit 1
        }
